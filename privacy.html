        ul { padding-left: 24px; }
        li { margin-bottom: 8px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .highlight {
            background: var(--bg-card);
            border-left: 3px solid var(--primary);
            padding: 20px 24px; border-radius: 0 12px 12px 0; margin: 24px 0;
        }
        .highlight p { margin-bottom: 0; color: var(--text); }
        .back-link {
            display: inline-block; margin-bottom: 32px;
            color: var(--text-secondary); font-size: 14px;
        }
        table { width: 100%; border-collapse: collapse; margin: 16px 0 24px; }
        th, td {
            text-align: left; padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px; color: var(--text-secondary);
        }
        th { color: var(--text); font-weight: 600; background: var(--bg-card); }

        });
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[onclick="setLang('${lang}')"]`).classList.add('active');
        document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
        localStorage.setItem('deeptalk-lang', lang);
    }

    (function() {
        const saved = localStorage.getItem('deeptalk-lang');
        if (saved && translations[saved]) { setLang(saved); return; }
        const browserLang = navigator.language.toLowerCase();
        if (browserLang.startsWith('ko')) setLang('ko');
        else if (browserLang.startsWith('ja')) setLang('ja');
        else if (browserLang.startsWith('es')) setLang('es');
        else if (browserLang.startsWith('pt')) setLang('pt');
        else setLang('en');
    })();
    </script>
</body>
</html>
