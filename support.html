<html lang="en">
<head>

    <style>
        :root {
            --bg: #0F0F1A;
            --bg-card: #1A1A2E;
            --text: #E8E8F0;
            --text-secondary: #A0A0B8;
            --primary: #6C5CE7;
            --accent: #A29BFE;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans KR', 'Noto Sans JP', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 80px 24px; }
        .lang-switcher {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; gap: 4px;
            background: rgba(26,26,46,0.9); backdrop-filter: blur(12px);
            border-radius: 12px; padding: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lang-btn {
            padding: 6px 12px; border: none; background: transparent;
            color: var(--text-secondary); font-size: 13px; font-weight: 500;
            cursor: pointer; border-radius: 8px; transition: all 0.2s;
        }
        .lang-btn:hover { color: var(--text); }
        .lang-btn.active { background: var(--primary); color: white; }
        .back-link {
            display: inline-block; margin-bottom: 32px;
            color: var(--text-secondary); font-size: 14px; text-decoration: none;
        }
        .back-link:hover { color: var(--text); }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 16px; }
        .subtitle { color: var(--text-secondary); font-size: 18px; margin-bottom: 48px; }
        h2 {
            font-size: 22px; font-weight: 600;
            margin-top: 48px; margin-bottom: 16px; color: var(--accent);
        }
        p, li { font-size: 16px; color: var(--text-secondary); margin-bottom: 12px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .how-to {
            background: var(--bg-card); border-radius: 16px;
            padding: 28px; margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .how-to h3 { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
        .step { display: flex; gap: 12px; margin-bottom: 8px; align-items: flex-start; }
        .step-num {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 28px; height: 28px; background: var(--primary);
            border-radius: 50%; font-size: 14px; font-weight: 600; color: white;
        }
        .step p { margin-bottom: 0; }
        .faq-item {
            background: var(--bg-card); border-radius: 16px;
            padding: 24px; margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .faq-item h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        .faq-item p { margin-bottom: 0; font-size: 15px; }
        .contact-card {
            background: var(--bg-card); border-radius: 16px;
            padding: 32px; text-align: center; margin-top: 48px;
            border: 1px solid rgba(108,92,231,0.2);
        }
        .contact-card h3 { font-size: 20px; margin-bottom: 12px; }
        .contact-card .email-btn {
            display: inline-block; padding: 12px 28px;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE);
            color: white; border-radius: 12px; font-weight: 600;
            margin-top: 16px; text-decoration: none;
        }
        .contact-card .email-btn:hover { opacity: 0.9; }
        @media (max-width: 640px) {
            .lang-switcher { top: 12px; right: 12px; }
            .lang-btn { padding: 5px 8px; font-size: 12px; }
        }
    </style>
</head>

    function setLang(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang] && translations[lang][key]) {
                el.textContent = translations[lang][key];
            }
        });
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[onclick="setLang('${lang}')"]`).classList.add('active');
        document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
        localStorage.setItem('deeptalk-lang', lang);
    }

    (function() {
        const saved = localStorage.getItem('deeptalk-lang');
        if (saved && translations[saved]) { setLang(saved); return; }
        const browserLang = navigator.language.toLowerCase();
        if (browserLang.startsWith('ko')) setLang('ko');
        else if (browserLang.startsWith('ja')) setLang('ja');
        else if (browserLang.startsWith('es')) setLang('es');
        else if (browserLang.startsWith('pt')) setLang('pt');
        else setLang('en');
    })();
    </script>
