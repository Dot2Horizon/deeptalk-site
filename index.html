    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --accent: #A29BFE;
            --bg: #0F0F1A;
            --bg-card: #1A1A2E;
            --text: #FFFFFF;
            --text-secondary: #A0A0B8;
            --gradient: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 50%, #74B9FF 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans KR', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

        /* Language Switcher */
        .lang-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 4px;
            background: rgba(26,26,46,0.9);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lang-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .lang-btn:hover { color: var(--text); }
        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(108,92,231,0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .hero-content { position: relative; z-index: 1; }
        .hero-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
            background: rgba(108,92,231,0.15);
            border: 1px solid rgba(108,92,231,0.3);
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 32px;
        }
        .hero h1 {
            font-size: clamp(48px, 8vw, 80px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: clamp(18px, 3vw, 22px);
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            background: var(--gradient);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(108,92,231,0.4);
        }
        .cta-button svg { width: 24px; height: 24px; }

        /* Features */
        .features { padding: 120px 0; }
        .section-title {
            text-align: center;
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .section-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 64px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .feature-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: border-color 0.3s;
        }
        .feature-card:hover { border-color: rgba(108,92,231,0.3); }
        .feature-icon { font-size: 36px; margin-bottom: 16px; }
        .feature-card h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .feature-card p { color: var(--text-secondary); font-size: 15px; }

        /* Privacy */
        .privacy-section { padding: 120px 0; text-align: center; }
        .privacy-badges {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 48px;
        }
        .privacy-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 28px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .privacy-badge .icon { font-size: 28px; }
        .privacy-badge .label { font-size: 16px; font-weight: 500; }

        /* Messengers */
        .messengers { padding: 80px 0; text-align: center; }
        .messenger-logos {
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
            margin-top: 48px;
        }
        .messenger-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .messenger-item .icon { font-size: 48px; }
        .messenger-item .name { font-size: 16px; color: var(--text-secondary); }

        /* Footer */
        footer {
            padding: 48px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        footer nav {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
        }
        footer a:hover { color: var(--text); }
        footer .copy { color: var(--text-secondary); font-size: 13px; }

        @media (max-width: 640px) {
            .features-grid { grid-template-columns: 1fr; }
            .privacy-badges { flex-direction: column; align-items: center; }
            .lang-switcher { top: 12px; right: 12px; }
            .lang-btn { padding: 5px 8px; font-size: 12px; }
        }
    </style>
</head>

    function setLang(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang] && translations[lang][key]) {
                el.innerHTML = translations[lang][key].replace(/\n/g, '<br>');
            }
        });
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[onclick="setLang('${lang}')"]`).classList.add('active');
        document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
        localStorage.setItem('deeptalk-lang', lang);
    }

    // Auto-detect language or use saved preference
    (function() {
        const saved = localStorage.getItem('deeptalk-lang');
        if (saved && translations[saved]) { setLang(saved); return; }
        const browserLang = navigator.language.toLowerCase();
        if (browserLang.startsWith('ko')) setLang('ko');
        else if (browserLang.startsWith('ja')) setLang('ja');
        else if (browserLang.startsWith('es')) setLang('es');
        else if (browserLang.startsWith('pt')) setLang('pt');
        else setLang('en');
    })();
    </script>
